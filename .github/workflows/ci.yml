name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Crear environment files
        run: |
          mkdir -p src/environments
          cat > src/environments/environment.ts << 'EOF'
          export const environment = {
            production: true,
            supabaseUrl: '${{ secrets.SUPABASE_URL }}',
            supabaseKey: '${{ secrets.SUPABASE_KEY }}',
            supabaseEdgeFnUrl: '${{ secrets.SUPABASE_URL }}/functions/v1'
          };
          EOF
          cat > src/environments/environment.development.ts << 'EOF'
          export const environment = {
            production: false,
            supabaseUrl: '${{ secrets.SUPABASE_URL }}',
            supabaseKey: '${{ secrets.SUPABASE_KEY }}',
            supabaseEdgeFnUrl: '${{ secrets.SUPABASE_URL }}/functions/v1'
          };
          EOF

      - name: Run all tests
        run: npm run test:ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
