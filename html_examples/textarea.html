<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bio fieldset (morado si &gt; 4 caracteres)</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
    }

    .custom-fieldset {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 16px;
      width: 100%;
      max-width: 400px;
      transition: all 0.3s ease;
    }

    .custom-legend {
      font-size: 14px;
      font-weight: 600;
      padding: 0 6px;
      color: #374151;
      transition: color 0.3s ease;
    }

    .custom-textarea {
      width: 100%;
      height: 96px;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      resize: vertical;
      font-size: 14px;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    .custom-label {
      margin-top: 6px;
      font-size: 12px;
      color: #6b7280;
      transition: color 0.3s ease;
    }

    /* Morado cuando el texto tiene más de 4 caracteres */
    .purple-state {
      border-color: #7c3aed;
    }

    .purple-state .custom-legend {
      color: #7c3aed;
    }

    .purple-state .custom-textarea {
      border-color: #7c3aed;
      box-shadow: 0 0 0 1px #7c3aed;
    }

    .purple-state .custom-label {
      color: #7c3aed;
    }
  </style>
</head>
<body>

  <fieldset class="custom-fieldset" id="fieldset">
    <legend class="custom-legend">Your bio</legend>

    <textarea class="custom-textarea" placeholder="Bio"></textarea>

    <div class="custom-label">Optional</div>
  </fieldset>

  <script>
    function updatePurpleState() {
      const fieldset = document.getElementById("fieldset");
      const textarea = fieldset.querySelector(".custom-textarea");

      if (textarea.value.length > 4) {
        fieldset.classList.add("purple-state");
      } else {
        fieldset.classList.remove("purple-state");
      }
    }

    document
      .querySelector(".custom-textarea")
      .addEventListener("input", updatePurpleState);

    updatePurpleState();
  </script>

</body>
</html>
