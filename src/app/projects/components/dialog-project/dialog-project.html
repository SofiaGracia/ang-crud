<!-- dialog-project.html -->
<dialog-shell
    #shell
    entityName="project"
    placeholder="Name your project"
    [createForm]="createForm"
    [submitFn]="onSubmit.bind(this)"
    [errorsFn]="errorsName.bind(this)"
    [onClose]="closeModal.bind(this)"
>
    <h3 slot="title" class="text-lg font-bold">Create project</h3>
    <!-- <h4 slot="debug">{{ project() | json }}</h4> -->
</dialog-shell>
