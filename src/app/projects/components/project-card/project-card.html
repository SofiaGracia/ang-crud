<dialog-project #dialogPro [mode]="'edit'" [project]="project()" data-testid="modify-dialog"></dialog-project>
<div
    data-testid="project-card"
    class="bg-surface shadow-sm hover:shadow-md hover:bg-surface2/50 transition relative w-full cursor-pointer rounded-xl"
    [routerLink]="['/projects', project().id]"
>
    <figure class="overflow-hidden rounded-t-xl">
        @if (first4prototypes().length > 0) {
            <div class="grid grid-cols-2 gap-0.5 w-full h-48 bg-surface2">
                @for (proto of first4prototypes(); track proto.id; let i = $index) {
                    @if (i < 4) {
                        <div class="bg-surface flex items-center justify-center overflow-hidden">
                            <span class="text-xs text-text/50 truncate px-2">
                                {{ proto.name }}
                            </span>
                        </div>
                    }
                }
                @for (i of [0, 1, 2, 3]; track i) {
                    @if (i >= first4prototypes().length) {
                        <div class="bg-surface flex items-center justify-center">
                            <fa-icon [icon]="faPlus" class="text-text/30 text-2xl"></fa-icon>
                        </div>
                    }
                }
            </div>
        } @else {
            <div
                class="w-full h-48 bg-gradient-to-br from-primary/20 via-surface to-accent/10 flex items-center justify-center rounded-t-xl"
            >
                <fa-icon [icon]="faPlus" class="text-text/50 text-4xl"></fa-icon>
            </div>
        }
    </figure>
    <div class="p-4">
        <div class="flex flex-row justify-between items-center">
            <div class="flex flex-col">
                <h2 data-testid="project-title" class="text-lg font-semibold text-text">
                    {{ project().name }}
                </h2>
                <p class="text-text/80">
                    {{ displayDescription() }}
                </p>
                <span class="text-xs text-text/60 mt-1">
                    {{ prototypeLabel() }}
                </span>
            </div>

            <!-- Custom dropdown -->
            <div class="relative" (click)="$event.stopPropagation()">
                <button
                    aria-label="Open project menu"
                    data-testid="project-menu"
                    type="button"
                    class="p-2 rounded-full hover:bg-surface2 transition-colors"
                    (click)="toggleDropdown()"
                >
                    <fa-icon [icon]="faEllipsis"></fa-icon>
                </button>
                @if (isDropdownOpen()) {
                    <ul
                        class="absolute right-0 top-full mt-2 bg-surface shadow-lg p-2 rounded-lg w-32 z-10"
                    >
                        <li>
                            <button
                                (click)="deleteProject($event, project().id)"
                                class="text-danger hover:text-danger/80 w-full text-left px-2 py-1 rounded"
                                data-testid="project-move-to-trash"
                            >
                                Move to Trash
                            </button>
                        </li>
                        <li>
                            <button
                                (click)="openEditDialog()"
                                class="text-text hover:text-text/80 w-full text-left px-2 py-1 rounded"
                            >
                                Modify
                            </button>
                        </li>
                    </ul>
                }
            </div>
        </div>
    </div>
</div>
