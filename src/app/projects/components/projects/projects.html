<p>projects works!</p>

<dialog-create-project #dialogCreate></dialog-create-project>
@if (projects$ | async; as projects) {
    @if (projects.length === 0) {
        <p>No hi ha projectes.</p>
    }

    @for (proj of projects; track proj.id) {
        <project-card [project]="proj"></project-card>
    }
} @else {
    <p>Carregant projectes...</p>
}
