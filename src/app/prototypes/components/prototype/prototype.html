<div class="flex flex-col gap-4">
    <div class="flex items-center justify-between">
        <div>
            <h2 class="text-2xl font-semibold">
                {{ prototype()?.name ?? 'Preview de prototipo' }}
            </h2>
            @if (prototype()?.description) {
                <p class="text-base-content/70">{{ prototype()?.description }}</p>
            }
        </div>
    </div>

    @if (loading()) {
        <div class="h-[70vh] rounded-box bg-base-200 flex items-center justify-center">
            <span class="loading loading-spinner loading-lg" data-testid="prototype-loading"></span>
        </div>
    } @else if (error()) {
        <div class="alert alert-warning" data-testid="prototype-error-message">
            <span>{{ error() }}</span>
        </div>
    } @else if (srcdoc()) {
        <div class="rounded-box border border-base-300 overflow-hidden ">
            <div class="border-b border-base-300">
                <div class="tabs tabs-boxed">
                    <button
                        type="button"
                        class="tab"
                        [class.tab-active]="activeTab() === 'preview'"
                        (click)="activeTab.set('preview')"
                        data-testid="prototype-tab-preview"
                    >
                        Preview
                    </button>
                    <button
                        type="button"
                        class="tab"
                        [class.tab-active]="activeTab() === 'code'"
                        (click)="activeTab.set('code')"
                        data-testid="prototype-tab-code"
                    >
                        Código
                    </button>
                </div>
            </div>

            @if (activeTab() === 'preview') {
                <iframe
                    [srcdoc]="srcdoc()!"
                    class="w-full min-h-[75vh] border-0"
                    sandbox="allow-scripts"
                    scrolling="auto"
                    data-testid="prototype-render-iframe"
                ></iframe>
            } @else {
                <div class="p-4">
                    <pre class="max-h-[75vh] overflow-x-auto overflow-y-auto whitespace-pre text-sm" data-testid="prototype-code-view">{{ downloadedHtml() ?? '' }}</pre>
                </div>
            }
        </div>
    }
</div>
