<section class="flex grow gap-2 mb-6">
    <div class="w-full relative">
        <input
            type="text"
            class="input input-bordered mr-2 w-full"
            [placeholder]="valuePlaceholder()"
            autofocus
            #txtSearch
            (keyup.enter)="searchedValue.emit(txtSearch.value)"
            (keyup)="searchedValue.emit(txtSearch.value); inputValue.set(txtSearch.value)"
            [value]="initialValue()"
            (blur)="dropdownClosed.emit()"
        />

        <div
            id="dropdown"
            class="w-full absolute bg-gray-800 rounded-md z-10 left-0"
            (mousedown)="$event.preventDefault()"
        >
            <ul class="text-sm text-body font-medium">
                @if (searchResults() !== null) {
                    @for (item of searchResults(); track $index) {
                        <li
                            class="m-3 cursor-pointer hover:bg-gray-700 rounded-md"
                            (click)="onItemClick(item)"
                        >
                            <span
                                href="#"
                                class="p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded-md justify-between items-center"
                            >
                                <span>{{ item.name }}</span>
                            </span>
                            <span
                                class="badge"
                                [class.badge-primary]="item.type === 'project'"
                                [class.badge-secondary]="item.type === 'prototype'"
                            >
                                {{ item.type }}
                            </span>
                        </li>
                    }
                    @if (errorMessage()) {
                        <li class="m-3">{{ errorMessage() }}</li>
                    }
                    @if (isEmpty() && !isLoading()) {
                        <li class="m-3">No se encontraron resultados</li>
                    }
                }
                @if (isLoading()) {
                    <li class="m-3">Buscando</li>
                }
            </ul>
        </div>
    </div>
    <button class="btn btn-primary" (click)="searchedValue.emit(txtSearch.value)">Buscar</button>
</section>
